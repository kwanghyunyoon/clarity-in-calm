[build]
  command   = "npx expo export --platform web"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — expo-router handles all routing client-side
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache immutable hashed assets forever
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the HTML entry point
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
